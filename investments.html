<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investments</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/pages/investment.css" />
</head>
<body>
    <div id="header-container"></div>
   <div id="sidebar-container"></div>

    <main class="main">
      <div class="section-divider">

            <section class="investments-details-section">
                  <h2>Investments Transactions</h2>
                  <div> <button id="addInvestmentBtn">Add Investment</button> </div>
                  <table class="investments-transactions-table">
                        <thead>
                              <tr>
                                    <th>Date</th>
                                    <th>Type</th>
                                    <th>Amount</th>
                                    <th>Asset</th>
                              </tr>
                        </thead>
                        <tbody id="investmentsTableBody">
                              <!-- Investment transactions will be dynamically inserted here -->
                        </tbody>
                  </table>
            </section>
            <section class="investments-chart-section">
                  <h2>Investments</h2>
                <canvas class="investments-chart" id="investmentsChart"></canvas>
            </section>
      </div>
          <section class="investments-table-section">
                <h2>Investment Companies</h2>
                <div> <button id="addCompanyBtn">Add Company</button> </div>
                <table class="investment-companies-table">
                      <thead>
                            <tr id="investmentsTableHeadRow">
                                  <th>Investment Name</th>
                            </tr>
                      </thead>
                      <tbody id="investmentCompaniesTableBody">
                            <!-- Investment companies data will be dynamically inserted here -->
                      </tbody>
                </table>
          </section>


    </main>
    <div id="footer-container"></div>
     <div class="modal" id="appModal" aria-hidden="true">
      <div class="modal__backdrop" data-modal-close></div>

      <div
        class="modal__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="companyModalTitle"
        aria-describedby="companyModalTitle"
      >
        <header class="modal__header">
          <h2 id="companyModalTitle">Add Company</h2>
          <button
            class="modal__close"
            data-modal-close
            aria-label="Close Modal"
          >
            &times;
          </button>
        </header>

        <div class="modal__content" id="companyModalBody"></div>
        <div class="modal__content" id="transactionModalBody"></div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="scripts/includes.js"></script>
    <script src="./scripts/ui/companyForm.js" type="module"></script>
    <script src="./scripts/ui/transactionForm.js" type="module"></script>
   <script src="scripts/main.js" type="module"></script>
   <script src="scripts/pages/investments.page.js" type="module"></script>
</body>
</html>
